apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: prometheus-rules-dev
  namespace: monitoring
spec:
  groups:
    - name: node.rules
      rules:
        - alert: NodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure", status="true"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Node memory pressure detected
        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Node disk pressure detected
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Node is not ready
        - alert: HighCPU
          expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High CPU usage on node
        - alert: HighMemory
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High memory usage on node

    - name: pod.rules
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Pod is crash looping
        - alert: PodNotHealthy
          expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"}) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Pod is not healthy

    - name: persistentvolume.rules
      rules:
        - alert: PersistentvolumeclaimPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: PVC is pending

    - name: recording.rules
      rules:
        - record: node:cpu_utilization:ratio
          expr: 1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
        - record: node:memory_utilization:ratio
          expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
        - record: node:disk_utilization:ratio
          expr: 1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})
        - record: node:network_receive_bytes:rate5m
          expr: sum by (instance) (rate(node_network_receive_bytes_total[5m]))
        - record: node:network_transmit_bytes:rate5m
          expr: sum by (instance) (rate(node_network_transmit_bytes_total[5m]))
        - record: kube:pod_status_phase:sum
          expr: sum by (namespace, phase) (kube_pod_status_phase)
        - record: kube:deployment_status_replicas_available:sum
          expr: sum by (namespace, deployment) (kube_deployment_status_replicas_available)
