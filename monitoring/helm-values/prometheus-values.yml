prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 10GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    externalLabels:
      cluster: management-cluster

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi

alertmanager:
  enabled: true
