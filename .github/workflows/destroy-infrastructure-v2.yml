name: Destroy Infrastructure V2 (Management → Dev)

on:
  workflow_dispatch:

env:
  AWS_REGION: "ap-southeast-1"

jobs:
  destroy-management:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Init (Management)
        working-directory: ./infrastructure-v2/environments/management
        run: terraform init
      
      - name: Terraform Destroy (Management)
        working-directory: ./infrastructure-v2/environments/management
        run: terraform destroy -auto-approve

  destroy-dev:
    needs: destroy-management
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Init (Dev)
        working-directory: ./infrastructure-v2/environments/dev
        run: terraform init
      
      - name: Terraform Destroy (Dev)
        working-directory: ./infrastructure-v2/environments/dev
        run: terraform destroy -auto-approve
