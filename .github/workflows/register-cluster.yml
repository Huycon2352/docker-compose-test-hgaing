name: Register EKS Cluster To ArgoCD

on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AWS LOGIN
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      # INSTALL TOOLS
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64

          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      # LOGIN MANAGEMENT CLUSTER
      - name: Connect management cluster
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region ap-southeast-1

      # GET ARGOCD PASSWORD
      - name: Get ArgoCD Password
        run: |
          kubectl get svc -n argocd

          PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          echo "ARGO_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # GET ARGOCD LB HOST
      - name: Get ArgoCD Endpoint
        run: |
          HOST=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "ARGO_HOST=$HOST" >> $GITHUB_ENV

      # LOGIN ARGOCD
      - name: Login ArgoCD
        run: |
          argocd login $ARGO_HOST \
            --username admin \
            --password $ARGO_PASSWORD \
            --insecure

      # REGISTER DEV CLUSTER
      - name: Register dev cluster
        run: |
          aws eks update-kubeconfig \
            --name dev-cluster \
            --region ap-southeast-1 \
            --alias dev-cluster

          argocd cluster add \
            $(kubectl config current-context) \
            --yes

      # OPTIONAL PROD
      - name: Register prod cluster
        run: |
          aws eks update-kubeconfig \
            --name prod-cluster \
            --region ap-southeast-1 \
            --alias prod-cluster || true

          argocd cluster add \
            prod-cluster \
            --yes || true
