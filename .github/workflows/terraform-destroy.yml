name: Full AWS Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        default: "NO"

env:
  AWS_REGION: ap-southeast-1

jobs:
  destroy:
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # AWS LOGIN
      # =========================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================================
      # TERRAFORM
      # =========================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================================================
      # KUBECTL
      # =========================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # =========================================================
      # CONNECT MANAGEMENT CLUSTER
      # =========================================================
      - name: Connect management cluster
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region $AWS_REGION

      # =========================================================
      # REMOVE FINALIZERS
      # =========================================================
      - name: Remove ArgoCD finalizers
        continue-on-error: true
        run: |
          kubectl get applications.argoproj.io -n argocd -o name | while read app; do
            kubectl patch $app -n argocd \
              --type merge \
              -p '{"metadata":{"finalizers":[]}}'
          done

      # =========================================================
      # DELETE APPS
      # =========================================================
      - name: Delete ArgoCD apps
        continue-on-error: true
        run: |
          kubectl delete applications --all -n argocd --timeout=120s || true

      # =========================================================
      # DELETE LOADBALANCERS
      # =========================================================
      - name: Delete Kubernetes LoadBalancers
        continue-on-error: true
        run: |
          kubectl delete svc --all -A --timeout=180s || true

      # =========================================================
      # DELETE PVC
      # =========================================================
      - name: Delete PVC
        continue-on-error: true
        run: |
          kubectl delete pvc --all -A --timeout=180s || true

      # =========================================================
      # WAIT AWS LB CLEANUP
      # =========================================================
      - name: Wait for AWS cleanup
        run: sleep 180

      # =========================================================
      # DESTROY DEV CLUSTER
      # =========================================================
      - name: Destroy Dev Infrastructure
        working-directory: infrastructure/environments/dev
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 120 && terraform destroy -auto-approve)

      # =========================================================
      # DESTROY MANAGEMENT CLUSTER
      # =========================================================
      - name: Destroy Management Infrastructure
        working-directory: infrastructure/environments/management
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 120 && terraform destroy -auto-approve)

      # =========================================================
      # WAIT ENI CLEANUP
      # =========================================================
      - name: Wait for ENI cleanup
        run: |
          echo "Waiting for EKS ENIs cleanup..."
          sleep 300

      # =========================================================
      # FORCE DELETE EC2 INSTANCES
      # =========================================================
      - name: Force terminate EC2 instances
        continue-on-error: true
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters Name=instance-state-name,Values=running,pending,stopping,stopped \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          if [ ! -z "$INSTANCE_IDS" ]; then
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS
          fi

      # =========================================================
      # DELETE NAT GATEWAYS
      # =========================================================
      - name: Delete NAT Gateways
        continue-on-error: true
        run: |
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --query "NatGateways[*].NatGatewayId" \
            --output text)

          for nat in $NAT_IDS; do
            aws ec2 delete-nat-gateway \
              --nat-gateway-id $nat || true
          done

      # =========================================================
      # WAIT NAT DELETE
      # =========================================================
      - name: Wait NAT cleanup
        run: sleep 180

      # =========================================================
      # RELEASE EIP
      # =========================================================
      - name: Release Elastic IPs
        continue-on-error: true
        run: |
          ALLOC_IDS=$(aws ec2 describe-addresses \
            --query "Addresses[*].AllocationId" \
            --output text)

          for eip in $ALLOC_IDS; do
            aws ec2 release-address \
              --allocation-id $eip || true
          done

      # =========================================================
      # DESTROY BOOTSTRAP
      # =========================================================
      - name: Destroy Bootstrap Backend
        working-directory: infrastructure/bootstrap
        run: |
          terraform init
          terraform destroy -auto-approve || true

      # =========================================================
      # FINAL CHECK
      # =========================================================
      - name: Remaining AWS resources
        continue-on-error: true
        run: |
          echo "==== EKS ===="
          aws eks list-clusters

          echo "==== EC2 ===="
          aws ec2 describe-instances \
            --query "Reservations[*].Instances[*].[InstanceId,State.Name]" \
            --output table

          echo "==== NAT ===="
          aws ec2 describe-nat-gateways \
            --query "NatGateways[*].[NatGatewayId,State]" \
            --output table

          echo "==== EIP ===="
          aws ec2 describe-addresses \
            --query "Addresses[*].[PublicIp]" \
            --output table

          echo "==== VPC ===="
          aws ec2 describe-vpcs \
            --query "Vpcs[*].[VpcId,CidrBlock]" \
            --output table
