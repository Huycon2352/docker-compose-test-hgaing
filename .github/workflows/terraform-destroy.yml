name: Full AWS Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        default: "NO"

env:
  AWS_REGION: ap-southeast-1

jobs:
  destroy:
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # AWS LOGIN
      # =========================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================================
      # TERRAFORM
      # =========================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================================================
      # KUBECTL
      # =========================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # =========================================================
      # CONNECT MANAGEMENT CLUSTER
      # =========================================================
      - name: Connect management cluster
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region $AWS_REGION

      # =========================================================
      # REMOVE FINALIZERS
      # =========================================================
      - name: Remove ArgoCD finalizers
        continue-on-error: true
        run: |
          kubectl get applications.argoproj.io -n argocd -o name 2>/dev/null | while read app; do
            kubectl patch $app -n argocd \
              --type merge \
              -p '{"metadata":{"finalizers":[]}}' || true
          done

      # =========================================================
      # DELETE APPS
      # =========================================================
      - name: Delete ArgoCD apps
        continue-on-error: true
        run: |
          kubectl delete applications --all -n argocd --timeout=120s || true

      # =========================================================
      # DELETE LOADBALANCERS
      # =========================================================
      - name: Delete Kubernetes LoadBalancers
        continue-on-error: true
        run: |
          kubectl delete svc --all -A --timeout=180s || true

      # =========================================================
      # DELETE PVC
      # =========================================================
      - name: Delete PVC
        continue-on-error: true
        run: |
          kubectl delete pvc --all -A --timeout=180s || true

      # =========================================================
      # WAIT LOADBALANCERS CLEANUP
      # =========================================================
      - name: Wait for LoadBalancers cleanup
        run: |
          echo "Waiting for LoadBalancers cleanup..."

          for i in {1..40}; do
            COUNT=$(aws elbv2 describe-load-balancers \
              --query "length(LoadBalancers)" \
              --output text 2>/dev/null || echo 0)

            echo "Remaining LoadBalancers: $COUNT"

            if [ "$COUNT" = "0" ]; then
              echo "All LoadBalancers deleted"
              exit 0
            fi

            sleep 15
          done

          echo "Timeout waiting LoadBalancers cleanup"

      # =========================================================
      # DESTROY DEV CLUSTER
      # =========================================================
      - name: Destroy Dev Infrastructure
        working-directory: infrastructure/environments/dev
        continue-on-error: true
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 60 && terraform destroy -auto-approve)

      # =========================================================
      # DESTROY ARGOCD
      # =========================================================
      - name: Destroy ArgoCD
        working-directory: infrastructure/environments/management-argocd
        continue-on-error: true
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 60 && terraform destroy -auto-approve)

      # =========================================================
      # DESTROY MANAGEMENT INFRA
      # =========================================================
      - name: Destroy Management Infrastructure
        working-directory: infrastructure/environments/management-infra
        continue-on-error: true
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 60 && terraform destroy -auto-approve)

      # =========================================================
      # WAIT ENI CLEANUP
      # =========================================================
      - name: Wait for ENI cleanup
        run: |
          echo "Waiting for ENIs cleanup..."

          for i in {1..60}; do
            COUNT=$(aws ec2 describe-network-interfaces \
              --filters Name=status,Values=in-use \
              --query "length(NetworkInterfaces)" \
              --output text 2>/dev/null || echo 0)

            echo "Remaining ENIs: $COUNT"

            if [ "$COUNT" = "0" ]; then
              echo "All ENIs deleted"
              exit 0
            fi

            sleep 10
          done

          echo "Timeout waiting ENIs cleanup"

      # =========================================================
      # FORCE DELETE EC2 INSTANCES
      # =========================================================
      - name: Force terminate EC2 instances
        continue-on-error: true
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters Name=instance-state-name,Values=running,pending,stopping,stopped \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          if [ ! -z "$INSTANCE_IDS" ]; then
            aws ec2 terminate-instances \
              --instance-ids $INSTANCE_IDS || true
          fi

      # =========================================================
      # DELETE NAT GATEWAYS
      # =========================================================
      - name: Delete NAT Gateways
        continue-on-error: true
        run: |
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --query "NatGateways[*].NatGatewayId" \
            --output text)

          for nat in $NAT_IDS; do
            aws ec2 delete-nat-gateway \
              --nat-gateway-id $nat || true
          done

      # =========================================================
      # WAIT NAT CLEANUP
      # =========================================================
      - name: Wait NAT cleanup
        run: |
          echo "Waiting NAT Gateways deletion..."

          for i in {1..40}; do
            COUNT=$(aws ec2 describe-nat-gateways \
              --filter Name=state,Values=available,pending,deleting \
              --query "length(NatGateways)" \
              --output text 2>/dev/null || echo 0)

            echo "Remaining NAT Gateways: $COUNT"

            if [ "$COUNT" = "0" ]; then
              echo "All NAT Gateways deleted"
              exit 0
            fi

            sleep 15
          done

          echo "Timeout waiting NAT cleanup"

      # =========================================================
      # RELEASE EIP
      # =========================================================
      - name: Release Elastic IPs
        continue-on-error: true
        run: |
          ALLOC_IDS=$(aws ec2 describe-addresses \
            --query "Addresses[*].AllocationId" \
            --output text)

          for eip in $ALLOC_IDS; do
            aws ec2 release-address \
              --allocation-id $eip || true
          done

      # =========================================================
      # FORCE DELETE REMAINING IAM ROLES
      # =========================================================
      - name: Delete remaining IAM roles and policies
        continue-on-error: true
        run: |
          aws iam detach-role-policy \
            --role-name management-eks-admin-role \
            --policy-arn arn:aws:iam::248195880649:policy/management-EKSAdminLimitedPolicy || true

          aws iam delete-role \
            --role-name management-eks-admin-role || true

          aws iam delete-policy \
            --policy-arn arn:aws:iam::248195880649:policy/management-EKSAdminLimitedPolicy || true

          aws iam delete-role \
            --role-name management-ebs-csi-role || true

      # =========================================================
      # DELETE CLOUDWATCH LOG GROUPS
      # =========================================================
      - name: Delete CloudWatch log groups
        continue-on-error: true
        run: |
          aws logs delete-log-group \
            --log-group-name /aws/eks/management-cluster/cluster || true

          aws logs delete-log-group \
            --log-group-name /aws/eks/dev-cluster/cluster || true

      # =========================================================
      # DELETE KMS ALIASES
      # =========================================================
      - name: Delete KMS aliases
        continue-on-error: true
        run: |
          aws kms delete-alias \
            --alias-name alias/eks/management-cluster || true

          aws kms delete-alias \
            --alias-name alias/eks/dev-cluster || true

      # =========================================================
      # DESTROY BOOTSTRAP
      # =========================================================
      - name: Destroy Bootstrap Backend
        working-directory: infrastructure/bootstrap
        continue-on-error: true
        run: |
          terraform init
          terraform destroy -auto-approve || true

      # =========================================================
      # FINAL CHECK
      # =========================================================
      - name: Remaining AWS resources
        continue-on-error: true
        run: |
          echo "==== EKS ===="
          aws eks list-clusters

          echo "==== EC2 ===="
          aws ec2 describe-instances \
            --query "Reservations[*].Instances[*].[InstanceId,State.Name]" \
            --output table

          echo "==== NAT ===="
          aws ec2 describe-nat-gateways \
            --query "NatGateways[*].[NatGatewayId,State]" \
            --output table

          echo "==== EIP ===="
          aws ec2 describe-addresses \
            --query "Addresses[*].[PublicIp]" \
            --output table

          echo "==== VPC ===="
          aws ec2 describe-vpcs \
            --query "Vpcs[*].[VpcId,CidrBlock]" \
            --output table

          echo "==== IAM ROLES ===="
          aws iam list-roles \
            --query "Roles[*].RoleName" \
            --output table

          echo "==== KMS ALIASES ===="
          aws kms list-aliases \
            --query "Aliases[*].AliasName" \
            --output table
