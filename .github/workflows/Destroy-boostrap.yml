name: Terraform Bootstrap Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure/bootstrap
        run: terraform init

      # Import lại resource vào state tạm
      - name: Import S3
        working-directory: infrastructure/bootstrap
        run: |
          terraform import aws_s3_bucket.tf_state terraform-state-voting-app-123456 || true

      - name: Import DynamoDB
        working-directory: infrastructure/bootstrap
        run: |
          terraform import aws_dynamodb_table.tf_lock terraform-lock || true

      # Empty bucket trước khi destroy
      - name: Empty S3 Bucket
        run: |
          aws s3 rm s3://terraform-state-voting-app-123456 --recursive || true

      - name: Terraform Destroy
        working-directory: infrastructure/bootstrap
        run: terraform destroy -auto-approve
