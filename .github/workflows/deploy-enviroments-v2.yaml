name: Deploy All Environments (Management -> Dev) - v2

on:
  workflow_dispatch:

jobs:
  deploy-management:
    runs-on: ubuntu-latest
    name: Deploy Management Environment
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1
      
      - name: Terraform Init
        working-directory: ./infrastructure-v2/environments/management
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./infrastructure-v2/environments/management
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        working-directory: ./infrastructure-v2/environments/management
        run: terraform apply -auto-approve tfplan

  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy Dev Environment
    needs: deploy-management
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1
      
      - name: Terraform Init
        working-directory: ./infrastructure-v2/environments/dev
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./infrastructure-v2/environments/dev
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        working-directory: ./infrastructure-v2/environments/dev
        run: terraform apply -auto-approve tfplan
