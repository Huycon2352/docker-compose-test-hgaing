name: Deploy Monitoring Stack (Management)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  MONITORING_NAMESPACE: monitoring
  PROMETHEUS_RELEASE_NAME: kube-prometheus-stack

jobs:
  deploy-monitoring-stack:
    name: Deploy Prometheus + Grafana on Management
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Connect to Management Cluster
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region ${{ env.AWS_REGION }}
          kubectl config current-context

      - name: Create Monitoring Namespace
        run: |
          kubectl create namespace ${{ env.MONITORING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl get ns ${{ env.MONITORING_NAMESPACE }}

      - name: Add Prometheus Community Helm Repository
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Deploy Kube Prometheus Stack
        run: |
          helm upgrade --install ${{ env.PROMETHEUS_RELEASE_NAME }} \
            prometheus-community/kube-prometheus-stack \
            --namespace ${{ env.MONITORING_NAMESPACE }} \
            --values monitoring/helm-values/prometheus-values.yml \
            --wait \
            --timeout 15m

      - name: Verify Monitoring Stack
        run: |
          kubectl get all -n ${{ env.MONITORING_NAMESPACE }}

      - name: Get Grafana Initial Password
        run: |
          set -euo pipefail

          GRAFANA_PASSWORD=$(kubectl get secret -n ${{ env.MONITORING_NAMESPACE }} \
            ${{ env.PROMETHEUS_RELEASE_NAME }}-grafana \
            -o jsonpath='{.data.admin-password}' | base64 -d)
          if [ -z "$GRAFANA_PASSWORD" ]; then
            echo "Grafana password is empty or unavailable"
            exit 1
          fi
          echo "::add-mask::$GRAFANA_PASSWORD"

      - name: Display Access Instructions
        run: |
          echo "✅ Monitoring stack deployed"
          echo ""
          echo "Prometheus:"
          echo "kubectl port-forward -n ${{ env.MONITORING_NAMESPACE }} svc/${{ env.PROMETHEUS_RELEASE_NAME }}-prometheus 9090:9090"
          echo "URL: http://localhost:9090"
          echo ""
          echo "Grafana:"
          echo "kubectl port-forward -n ${{ env.MONITORING_NAMESPACE }} svc/${{ env.PROMETHEUS_RELEASE_NAME }}-grafana 3000:80"
          echo "URL: http://localhost:3000"
          echo "Username: admin"
          echo "Password command:"
          echo "kubectl get secret -n ${{ env.MONITORING_NAMESPACE }} ${{ env.PROMETHEUS_RELEASE_NAME }}-grafana -o jsonpath='{.data.admin-password}' | base64 -d"
